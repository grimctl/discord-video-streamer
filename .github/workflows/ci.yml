name: CI

on:
  push:
    branches:
      - main
      - rewrite/**
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++ pkg-config libsodium-dev libzmq3-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run check

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          platforms: linux/amd64
          tags: discord-video-streamer:test

      - name: Smoke test container media tools
        run: |
          docker run --rm discord-video-streamer:test ffmpeg -version
          docker run --rm discord-video-streamer:test ffprobe -version
